# dataset
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp

# splitting
benchmark_filename: ['train', 'valid', 'test']

eval_args:
  group_by: user
  order: TO
  mode: full

# training
epochs: 50 # 30 era buono
seed: 42
reproducibility: True
train_batch_size: 2048 # 2048
learner: adam
learning_rate: 0.0005
neg_sampling:
  uniform: 3


# evaluation
metrics: ['NDCG', 'Recall', 'MRR']
topk: [10, 20, 50]
valid_metric: NDCG@20
eval_step: 100
stopping_step: 10
# model
embedding_size: 64 # 64
n_layers: 2

min_user_inter_num: 0
min_item_inter_num: 0
show_progress: True
log_progress: True
verbose: True
use_gpu: True
gpu_id: 0




